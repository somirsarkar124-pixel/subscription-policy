<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RestEasy Pharma - UK Sleep Care</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030712; --card: #111827; --primary: #0ea5e9; --secondary: #94a3b8; --text: #f8fafc; --danger: #ef4444; --success: #22c55e; --whatsapp: #25d366; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; padding: 15px; margin: 0; background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #030712 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        
        .brand-header { text-align: center; padding: 30px 0 15px 0; width: 100%; cursor: pointer; user-select: none; }
        .logo-box { width: 70px; height: 70px; background: linear-gradient(135deg, #3b82f6, #0ea5e9); border-radius: 18px; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; box-shadow: 0 0 25px rgba(14, 165, 233, 0.3); }
        .logo-box span { font-size: 40px; font-weight: 800; color: white; }
        .brand-name { font-size: 28px; font-weight: 800; margin: 0; }
        .brand-tagline { font-size: 12px; color: var(--secondary); letter-spacing: 2px; text-transform: uppercase; margin-top: 5px; }

        /* Admin Styles */
        .admin-box { display:none; background:var(--card); width:100%; max-width:550px; padding:20px; border-radius:24px; margin-bottom:20px; border:1px solid var(--primary); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .admin-box input, .admin-box select { width:100%; padding:10px; margin-bottom:8px; border-radius:10px; border:1px solid #1f2937; background:#030712; color:white; outline:none; }
        .stock-row { display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #1f2937; align-items:center; }

        #stockBanner { display: none; width: 100%; max-width: 550px; background: linear-gradient(90deg, #0ea5e9, #3b82f6); color: white; padding: 15px; border-radius: 15px; text-align: center; font-weight: 800; margin-bottom: 15px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } }

        .search-container { width: 100%; max-width: 550px; margin: 15px 0 25px 0; position: sticky; top: 10px; z-index: 100; }
        #searchBar { width: 100%; padding: 15px 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); background: rgba(17, 24, 39, 0.9); color: white; outline: none; backdrop-filter: blur(10px); }

        .med-item { background: var(--card); margin-bottom: 10px; padding: 12px; border-radius: 18px; display: flex; align-items: center; gap: 12px; border: 1px solid rgba(255,255,255,0.03); cursor: pointer; }
        .med-img { width: 55px; height: 55px; border-radius: 12px; object-fit: cover; }
        .med-name { font-weight: 700; color: #fff; font-size: 1rem; }
        .price-tag { color: var(--primary); font-weight: 800; font-size: 1.1rem; }

        /* Modal & Calc Box */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(6px); padding: 20px; }
        .modal-card { background: #111827; width: 100%; max-width: 380px; padding: 25px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .calc-box { background: rgba(255,255,255,0.04); padding: 18px; border-radius: 22px; margin: 15px 0; text-align: left; }
        .calc-row { display: flex; justify-content: space-between; margin-bottom: 8px; color: var(--secondary); font-size: 0.95rem; }
        .total-row { display: flex; justify-content: space-between; font-weight: 800; color: var(--primary); font-size: 1.4rem; border-top: 1px solid rgba(255,255,255,0.08); margin-top: 12px; padding-top: 12px; }

        .qty-selector { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 15px; }
        .qty-btn { background: var(--primary); color: #000; border: none; width: 35px; height: 35px; border-radius: 10px; font-weight: 800; cursor: pointer; }

        /* Cart UI */
        .cart-float { position: fixed; bottom: 25px; right: 25px; background: var(--primary); width: 60px; height: 60px; border-radius: 30px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(0,0,0,0.4); z-index: 900; cursor: pointer; }
        .cart-count { position: absolute; top: -5px; right: -5px; background: var(--danger); width: 22px; height: 22px; border-radius: 11px; font-size: 11px; font-weight: 800; display: flex; align-items: center; justify-content: center; }
        .cart-drawer { position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px; height: 100%; background: #0b0f1a; z-index: 1500; transition: 0.3s; padding: 25px; display: flex; flex-direction: column; }
        .cart-drawer.active { right: 0; }
        .cart-item { display: flex; gap: 10px; padding: 12px; background: #161e2e; border-radius: 15px; margin-bottom: 10px; align-items: center; }
        .delivery-select { width: 100%; padding: 12px; border-radius: 12px; background: #030712; color: white; border: 1px solid #1f2937; margin-bottom: 15px; }
        .order-btn { width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: 800; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body onload="load()">

    <div class="brand-header" onclick="adminTrigger()">
        <div class="logo-box"><span>R</span></div>
        <h1 class="brand-name">RestEasy Pharma</h1>
        <div class="brand-tagline">— UK PHARMACY SLEEP CARE —</div>
    </div>

    <div id="loginOverlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:2000; align-items:center; justify-content:center; backdrop-filter:blur(10px);">
        <div style="background:#0b0f1a; padding:30px; border-radius:20px; width:90%; max-width:300px; text-align:center; border: 1px solid #1f2937;">
            <h3 style="margin-top:0;">Admin Access</h3>
            <input type="password" id="admPass" placeholder="Enter PIN" style="width:100%; padding:12px; border-radius:10px; border:none; margin-bottom:15px; outline:none; text-align:center; font-size:1.5rem; background:#030712; color:white;">
            <button onclick="checkLogin()" style="width:100%; padding:12px; background:var(--primary); border:none; border-radius:10px; color:white; font-weight:800; cursor:pointer;">Login</button>
            <button onclick="document.getElementById('loginOverlay').style.display='none'" style="margin-top:15px; background:none; border:none; color:var(--secondary); cursor:pointer; font-weight:600;">Cancel</button>
        </div>
    </div>

    <div id="adminPanel" class="admin-box">
        <h3 style="margin-top:0; color:var(--primary); border-bottom:1px solid #1f2937; padding-bottom:10px;">Dashboard</h3>
        <button id="stockToggleBtn" onclick="toggleStockMode()" style="width:100%; padding:12px; margin-bottom:15px; border-radius:10px; border:none; font-weight:800; cursor:pointer;">Toggle Stock Mode</button>
        <div id="adminStockList" style="max-height:150px; overflow-y:auto; margin-bottom:15px; background:rgba(0,0,0,0.2); border-radius:10px; padding:10px;"></div>
        <input type="text" id="newName" placeholder="Medicine Name">
        <input type="text" id="newGen" placeholder="Generic Name">
        <input type="text" id="newImg" placeholder="Image URL">
        <input type="number" step="0.01" id="newPrice" placeholder="Price per Tablet">
        <input type="number" id="newMin" placeholder="Tablets per Strip">
        <select id="newCat">
            <option value="Anxiety & Benzodiazepines">Anxiety & Benzodiazepines</option>
            <option value="Pain Relief">Pain Relief</option>
            <option value="Sleep & Stimulants">Sleep & Stimulants</option>
        </select>
        <button onclick="saveMed()" style="width:100%; padding:14px; background:var(--primary); color:white; border:none; border-radius:12px; font-weight:800; cursor:pointer;">SAVE PRODUCT</button>
        <button onclick="document.getElementById('adminPanel').style.display='none'" style="width:100%; margin-top:12px; background:none; border:none; color:var(--secondary); cursor:pointer;">Exit Dashboard</button>
    </div>

    <div id="stockBanner">STOCK AVAILABLE NOW – ORDER QUICKLY!</div>

    <div class="search-container">
        <input type="text" id="searchBar" placeholder="Search medicines..." oninput="render()">
    </div>

    <div id="listContainer" style="width:100%; max-width:550px;"></div>

    <div class="cart-float" onclick="toggleCart()">
        <span style="font-size: 24px;">🛒</span>
        <div id="cartCount" class="cart-count">0</div>
    </div>

    <div id="cartDrawer" class="cart-drawer">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="margin:0;">Shopping Cart</h2>
            <button onclick="toggleCart()" style="background:none; border:none; color:white; font-size:28px; cursor:pointer;">×</button>
        </div>
        <div id="cartItems" style="flex:1; overflow-y:auto;"></div>
        <select id="cartDelivery" class="delivery-select" onchange="renderCart()">
            <option value="10">Next-Day Delivery (+£10)</option>
            <option value="15">Guaranteed Before 1:00 PM (+£15)</option>
        </select>
        <div class="calc-box">
            <div class="calc-row"><span>Items Price:</span><span id="cartSubtotal">£0.00</span></div>
            <div class="calc-row"><span>Delivery:</span><span id="cartDelPrice">£10.00</span></div>
            <div class="total-row"><span>Grand Total:</span><span id="cartGrandTotal">£0.00</span></div>
        </div>
        <button class="order-btn" style="background:var(--primary); color:white;" onclick="checkout('tg')">Order via Telegram</button>
        <button class="order-btn" style="background:var(--whatsapp); color:white;" onclick="checkout('wa')">Order via WhatsApp</button>
    </div>

    <div id="modalOverlay" class="modal-overlay" onclick="closeModal()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <img id="modalImg" style="width:75px; height:75px; border-radius:15px; border:2px solid var(--primary); margin-bottom:10px; object-fit:cover;">
            <h2 id="modalBrand" style="margin:0; color:var(--primary);"></h2>
            <p id="modalGen" style="color:var(--secondary); margin:5px 0; font-size:0.85rem;"></p>
            <div class="qty-selector">
                <button class="qty-btn" onclick="updateQty(-1)">-</button>
                <div id="orderQtyLabel" style="font-weight:800; font-size:1.1rem;">1 Strip</div>
                <button class="qty-btn" onclick="updateQty(1)">+</button>
            </div>
            <div class="calc-box">
                <div class="calc-row"><span>Total Tablets:</span><span id="mTotalTabs">0</span></div>
                <div class="calc-row"><span>Items Price:</span><span id="mItemPrice">£0.00</span></div>
                <div class="total-row"><span>Total:</span><span id="mGrandTotal">£0.00</span></div>
            </div>
            <button class="order-btn" style="background:var(--success); color:white;" onclick="addToCart()">ADD TO CART</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzXI7ho9lbhdWEYHMxxpGruUDYfPO8CznBpA9I2Cow47QYDgzszmEC2fiIWBt-gxJ2c/exec';
        let allMeds = [], cart = [], stockMode = false, currentMed = null, stripQty = 1;

        // Admin Trigger Logic (4 Clicks)
        let clickCount = 0;
        let clickTimer;
        function adminTrigger() {
            clickCount++;
            clearTimeout(clickTimer);
            if (clickCount === 4) {
                clickCount = 0;
                openLogin();
            }
            clickTimer = setTimeout(() => { clickCount = 0; }, 1000);
        }

        async function load() {
            try {
                const res = await fetch(SCRIPT_URL + "?action=getData");
                const data = await res.json();
                allMeds = data.medicines;
                stockMode = data.globalStockMode;
                updateAdminBtnUI();
                render();
            } catch (e) {}
        }

        function render() {
            const query = document.getElementById('searchBar').value.toLowerCase();
            const list = stockMode ? allMeds.filter(m => m.isAvailable) : allMeds;
            const filtered = list.filter(m => m.name.toLowerCase().includes(query) || m.generic.toLowerCase().includes(query));
            document.getElementById('stockBanner').style.display = stockMode ? 'block' : 'none';
            document.getElementById('listContainer').innerHTML = filtered.map(m => `
                <div class="med-item" onclick="openMed('${m.name}')">
                    <img src="${m.image}" class="med-img">
                    <div style="flex:1;"><b>${m.name}</b><br><small style="color:var(--secondary)">${m.generic}</small></div>
                    <div class="price-tag">£${(m.price * m.minQty).toFixed(2)}</div>
                </div>`).join('');
        }

        function openMed(name) {
            currentMed = allMeds.find(m => m.name === name);
            stripQty = 1;
            updateModal();
            document.getElementById('modalOverlay').style.display = 'flex';
        }

        function updateQty(v) { stripQty = Math.max(1, stripQty + v); updateModal(); }
        function updateModal() {
            const tabs = currentMed.minQty * stripQty, price = tabs * currentMed.price;
            document.getElementById('modalImg').src = currentMed.image;
            document.getElementById('modalBrand').innerText = currentMed.name;
            document.getElementById('modalGen').innerText = currentMed.generic;
            document.getElementById('orderQtyLabel').innerText = stripQty + (stripQty > 1 ? " Strips" : " Strip");
            document.getElementById('mTotalTabs').innerText = tabs;
            document.getElementById('mItemPrice').innerText = "£" + price.toFixed(2);
            document.getElementById('mGrandTotal').innerText = "£" + price.toFixed(2);
        }

        function addToCart() {
            cart.push({ ...currentMed, strips: stripQty, totalTabs: currentMed.minQty * stripQty, finalPrice: currentMed.price * currentMed.minQty * stripQty });
            closeModal(); renderCart();
        }

        function renderCart() {
            const count = document.getElementById('cartCount');
            count.innerText = cart.length; count.style.display = cart.length ? 'flex' : 'none';
            let sub = 0;
            document.getElementById('cartItems').innerHTML = cart.map((item, i) => {
                sub += item.finalPrice;
                return `<div class="cart-item">
                    <img src="${item.image}" style="width:40px; border-radius:8px; height:40px; object-fit:cover;">
                    <div style="flex:1; font-size:13px;"><b>${item.name}</b><br>${item.strips} Strips</div>
                    <div style="text-align:right;"><b>£${item.finalPrice.toFixed(2)}</b><br><span onclick="removeItem(${i})" style="color:var(--danger); font-size:11px; cursor:pointer; font-weight:800;">Remove</span></div>
                </div>`;
            }).join('');
            const del = parseFloat(document.getElementById('cartDelivery').value);
            document.getElementById('cartSubtotal').innerText = "£" + sub.toFixed(2);
            document.getElementById('cartDelPrice').innerText = "£" + (cart.length ? del.toFixed(2) : "0.00");
            document.getElementById('cartGrandTotal').innerText = "£" + (cart.length ? (sub + del).toFixed(2) : "0.00");
        }

        function removeItem(i) { cart.splice(i, 1); renderCart(); }
        function toggleCart() { document.getElementById('cartDrawer').classList.toggle('active'); }
        function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
        
        function checkout(type) {
            if(!cart.length) return alert("Cart is empty!");
            
            const subtotal = document.getElementById('cartSubtotal').innerText;
            const delText = document.getElementById('cartDelivery').options[document.getElementById('cartDelivery').selectedIndex].text;
            const deliveryCharge = "£" + parseFloat(document.getElementById('cartDelivery').value).toFixed(2);
            const grandTotal = document.getElementById('cartGrandTotal').innerText;
            
            // Item wise detailed price calculation for the message
            let itemsDetails = cart.map(c => `• ${c.name}: ${c.strips} Strip(s) (${c.totalTabs} Tabs) = £${c.finalPrice.toFixed(2)}`).join('\n');
            
            const msg = `NEW ORDER REQUEST\n\nOrder Details:\n${itemsDetails}\n\n--------------------\nItems Subtotal: ${subtotal}\nDelivery: ${delText} (${deliveryCharge})\n--------------------\nGRAND TOTAL: ${grandTotal}`;
            
            const link = type === 'tg' ? `https://t.me/resteasypharma` : `https://wa.me/447453383721`;
            window.open(link + `?text=${encodeURIComponent(msg)}`, '_blank');
        }

        // Admin Functions
        function openLogin() { document.getElementById('loginOverlay').style.display = 'flex'; }
        function checkLogin() {
            if(document.getElementById('admPass').value === "68") {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                renderAdminStock();
            } else alert("Wrong PIN!");
        }

        function renderAdminStock() {
            document.getElementById('adminStockList').innerHTML = allMeds.map(m => `
                <div class="stock-row">
                    <span style="font-size:12px;">${m.name}</span>
                    <input type="checkbox" ${m.isAvailable ? 'checked' : ''} onchange="toggleItem('${m.name}')">
                </div>`).join('');
        }

        async function toggleItem(name) {
            const med = allMeds.find(m => m.name === name); med.isAvailable = !med.isAvailable;
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "updateStockStatus", medName: name, status: med.isAvailable }) });
            render();
        }

        async function toggleStockMode() {
            stockMode = !stockMode; updateAdminBtnUI(); render();
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "toggleGlobalStock", mode: stockMode }) });
        }

        function updateAdminBtnUI() {
            const btn = document.getElementById('stockToggleBtn');
            if(btn) {
                btn.innerText = "Stock Mode: " + (stockMode ? "ON" : "OFF");
                btn.style.background = stockMode ? "var(--success)" : "#374151";
            }
        }

        async function saveMed() {
            const data = { action: "save", name: document.getElementById('newName').value, gen: document.getElementById('newGen').value, image: document.getElementById('newImg').value, price: document.getElementById('newPrice').value, min: document.getElementById('newMin').value, cat: document.getElementById('newCat').value };
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            alert("Saved!"); location.reload();
        }
    </script>
</body>
</html>
