<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Medicine Hub Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030712; --card: #111827; --primary: #0ea5e9;
            --secondary: #94a3b8; --accent: #f59e0b; --text: #f8fafc;
            --danger: #ef4444;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif; padding: 15px;
            display: flex; flex-direction: column; align-items: center; margin: 0;
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #030712 100%);
        }
        .header-controls { width: 100%; max-width: 600px; display: flex; justify-content: space-between; margin-bottom: 20px; gap: 8px; }
        .btn-action {
            background: rgba(255,255,255,0.05); color: var(--secondary); border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 15px; border-radius: 14px; cursor: pointer; font-size: 0.8rem; font-weight: 600;
        }
        .btn-deselect { display: none; color: var(--danger); border-color: rgba(239, 68, 68, 0.3); }
        .search-container { width: 100%; max-width: 600px; margin-bottom: 25px; position: sticky; top: 10px; z-index: 100; }
        #searchBar {
            width: 100%; padding: 16px 22px; font-size: 16px; border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1); background: rgba(17, 24, 39, 0.9); 
            color: white; outline: none; backdrop-filter: blur(15px);
        }
        .med-list { width: 100%; max-width: 600px; }
        .category-group { margin-bottom: 30px; }
        .category-title { color: var(--primary); font-size: 0.75rem; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; opacity: 0.7; }
        .med-item {
            background: var(--card); margin-bottom: 10px; padding: 16px 18px;
            border-radius: 18px; display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.03); 
        }
        .stock-checkbox { display: none; margin-right: 15px; width: 20px; height: 20px; }
        .stock-mode-active .stock-checkbox { display: block; }
        .stock-mode-active .btn-deselect { display: block; }
        .med-content { flex: 1; min-width: 0; }
        .med-name { font-weight: 700; color: #fff; font-size: 1.05rem; }
        .generic-name { font-size: 0.8rem; color: var(--secondary); display: block; }
        .price { color: var(--primary); font-weight: 800; font-size: 1.2rem; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(10px); }
        .modal-card { background: #111827; width: 85%; max-width: 380px; padding: 30px; border-radius: 28px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .total-box { background: var(--primary); color: #000; padding: 18px; border-radius: 16px; margin-top: 20px; font-weight: 800; font-size: 1.4rem; }
        .loader { color: var(--primary); margin-top: 100px; font-weight: 800; }
        
        /* Dropdown style */
        select { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: none; background: #030712; color: white; appearance: none; }
    </style>
</head>
<body>

    <div class="header-controls">
        <button class="btn-action" id="stockBtn" onclick="toggleStock()">Stock View</button>
        <button class="btn-action btn-deselect" id="deselectBtn" onclick="deselectAll()">Clear Selection</button>
        <button class="btn-action" onclick="showAdmin()">+ Admin</button>
    </div>

    <div id="adminPanel" style="display:none; background:var(--card); width:100%; max-width:600px; padding:20px; border-radius:20px; margin-bottom:20px; border:1px solid var(--primary);">
        <h3 style="margin-top:0">New Medicine Entry</h3>
        <input type="text" id="newName" placeholder="Brand Name" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border:none; background:#030712; color:white;">
        <input type="text" id="newGen" placeholder="Generic" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border:none; background:#030712; color:white;">
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <input type="number" id="newPrice" placeholder="Price" style="flex:1; padding:12px; border-radius:10px; border:none; background:#030712; color:white;">
            <input type="number" id="newMin" placeholder="Min Qty" style="flex:1; padding:12px; border-radius:10px; border:none; background:#030712; color:white;">
        </div>
        
        <label style="font-size: 0.8rem; color: var(--secondary); margin-left: 5px;">Select Category:</label>
        <select id="newCat">
            <option value="Anxiety & Benzodiazepines">Anxiety & Benzodiazepines</option>
            <option value="Pain Relief">Pain Relief</option>
            <option value="Sleep & Stimulants">Sleep & Stimulants</option>
        </select>

        <button onclick="saveData()" style="width:100%; padding:15px; background:var(--primary); border:none; border-radius:12px; font-weight:800; color:white;">SAVE TO SHEET 2</button>
        <button onclick="closeAdmin()" style="width:100%; margin-top:10px; background:transparent; color:var(--secondary); border:none;">Cancel</button>
    </div>

    <div class="search-container">
        <input type="text" id="searchBar" placeholder="Search medicine..." oninput="render()">
    </div>

    <div id="loading" class="loader">LOADING DATA...</div>
    <div class="med-list" id="listContainer"></div>

    <div id="modalOverlay" class="modal-overlay" onclick="closeModal()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h2 id="modalBrand" style="margin:0; color:var(--primary);"></h2>
            <p id="modalGen" style="color:var(--secondary);"></p>
            <p id="modalInfo" style="font-size:0.9rem; opacity:0.8;"></p>
            <div class="total-box">Pack Total: <span id="modalTotal"></span></div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw-Z3EkbWUn2-Lb68dn_9C-xqYqwYcrRpAGgEtWJ0m5L94-5jCV5oHst_UCSS3j1w_Law/exec'; 

        let allMeds = [];
        let isStockSelecting = false;
        let selectedItems = JSON.parse(localStorage.getItem('my_stock_list')) || [];

        async function loadData() {
            try {
                const res = await fetch(SCRIPT_URL + "?action=getData");
                const data = await res.json();
                if(data.medicines) {
                    allMeds = data.medicines.map(m => ({
                        name: m.name, gen: m.generic, price: m.price, min: m.minQty, cat: m.category || "General"
                    }));
                    render();
                    document.getElementById('loading').style.display = 'none';
                }
            } catch (e) { 
                document.getElementById('loading').innerText = "FAILED TO LOAD";
            }
        }

        function render() {
            const container = document.getElementById('listContainer');
            const query = document.getElementById('searchBar').value.toLowerCase();
            
            let list = isStockSelecting ? allMeds : (selectedItems.length > 0 ? allMeds.filter(m => selectedItems.includes(m.name)) : allMeds);
            if(query) list = list.filter(m => m.name.toLowerCase().includes(query) || m.gen.toLowerCase().includes(query));

            // ক্যাটাগরিগুলো অটো সাজানো (Fixed 3 names order maintained)
            const targetOrder = ["Anxiety & Benzodiazepines", "Pain Relief", "Sleep & Stimulants"];
            const foundCategories = [...new Set(list.map(m => m.cat))];
            
            // শিটে নতুন কিছু থাকলেও সেটা শেষে যোগ হবে
            const categories = targetOrder.filter(c => foundCategories.includes(c)).concat(foundCategories.filter(c => !targetOrder.includes(c)));

            let html = "";
            categories.forEach(cat => {
                html += `<div class="category-group"><h3 class="category-title">${cat}</h3>`;
                list.filter(m => m.cat === cat).forEach(m => {
                    const isChecked = selectedItems.includes(m.name) ? 'checked' : '';
                    html += `
                    <div class="med-item" onclick="showDetails('${m.name}', '${m.gen}', ${m.price}, ${m.min})">
                        <input type="checkbox" class="stock-checkbox" ${isChecked} onclick="event.stopPropagation()" onchange="handleSelect(event, '${m.name}')">
                        <div class="med-content">
                            <span class="med-name">${m.name}</span>
                            <span class="generic-name">${m.gen}</span>
                        </div>
                        <div class="price">£${m.price.toFixed(2)}</div>
                    </div>`;
                });
                html += `</div>`;
            });
            container.innerHTML = html || "<p style='text-align:center; opacity:0.5;'>No Medicine Found</p>";
        }

        async function saveData() {
            const btn = event.target;
            btn.innerText = "SAVING...";
            const data = {
                name: document.getElementById('newName').value,
                gen: document.getElementById('newGen').value,
                price: document.getElementById('newPrice').value,
                min: document.getElementById('newMin').value,
                cat: document.getElementById('newCat').value
            };
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            alert("Saved to Sheet 2!");
            location.reload();
        }

        function toggleStock() {
            if (prompt("Pass:") === "68") {
                isStockSelecting = !isStockSelecting;
                document.body.classList.toggle('stock-mode-active', isStockSelecting);
                document.getElementById('stockBtn').innerText = isStockSelecting ? "Save List" : "Stock View";
                render();
            }
        }

        function handleSelect(e, name) {
            if(e.target.checked) { if(!selectedItems.includes(name)) selectedItems.push(name); }
            else { selectedItems = selectedItems.filter(i => i !== name); }
            localStorage.setItem('my_stock_list', JSON.stringify(selectedItems));
        }

        function deselectAll() {
            if(confirm("Clear selection?")) { selectedItems = []; localStorage.removeItem('my_stock_list'); render(); }
        }

        function showDetails(n, g, p, m) {
            if(isStockSelecting) return;
            document.getElementById('modalBrand').innerText = n;
            document.getElementById('modalGen').innerText = g;
            document.getElementById('modalInfo').innerText = `Price: £${p.toFixed(2)} | Min Qty: ${m}`;
            document.getElementById('modalTotal').innerText = `£${(p*m).toFixed(2)}`;
            document.getElementById('modalOverlay').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
        function showAdmin() { if (prompt("Pass:") === "68") document.getElementById('adminPanel').style.display = "block"; }
        function closeAdmin() { document.getElementById('adminPanel').style.display = "none"; }

        loadData();
    </script>
</body>
</html>
